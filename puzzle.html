<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Siya ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  overflow: hidden;
}
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

.heart {
  font-size: 80px;
  cursor: pointer;
  animation: beat 1s infinite;
}
@keyframes beat {
  50% { transform: scale(1.2); }
}

.puzzle {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  grid-template-rows: repeat(4, 80px);
  gap: 2px;
}

.tile {
  width: 80px;
  height: 80px;
  background-size: 320px 320px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

#yesBtn { background: green; color: white; }
#noBtn { background: red; color: white; position: absolute; }
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="screen1" class="screen active">
  <h2>Hey Siya, someone made this for you ❤️<br>Click the heart</h2>
  <div class="heart" onclick="startPuzzle()">❤️</div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
  <h2>Arrange the puzzle 💕</h2>
  <div id="puzzle" class="puzzle"></div>
</div>

<!-- Screen 3 -->
<div id="screen3" class="screen">
  <h3 style="color:white; max-width:600px;">
    Every moment with you feels like a dream from which I don't want to wake up.<br><br>
    I never want to lose you and want you to be my forever and ever ❤️<br><br>
    Please accept my proposal 💍
  </h3>

  <button id="yesBtn" onclick="celebrate()">😻 Yes</button>
  <button id="noBtn">🙀 No</button>
</div>

<!-- Screen 4 -->
<div id="screen4" class="screen">
  <h1>🎉 YAAAYYY!!! 🎉</h1>
</div>

<script>

// 🔥 USE ONLINE IMAGE (REPLACE THIS)
const imageURL = "Phone/Pictures/file_00000000eab47208 ac33612f0a23595f.png";

// PUZZLE LOGIC
let order = [];

function startPuzzle() {
  switchScreen(1,2);

  const puzzle = document.getElementById("puzzle");
  puzzle.innerHTML = "";

  order = [...Array(16).keys()].sort(() => Math.random() - 0.5);

  order.forEach((val, i) => {
    let tile = document.createElement("div");
    tile.className = "tile";
    tile.style.backgroundImage = `url('${imageURL}')`;
    tile.style.backgroundPosition =
      `${-(val % 4) * 80}px ${-Math.floor(val / 4) * 80}px`;

    tile.onclick = () => move(i);

    puzzle.appendChild(tile);
  });
}

function move(i) {
  if (i < 15) {
    [order[i], order[i+1]] = [order[i+1], order[i]];
    startPuzzleRender();
    checkWin();
  }
}

function startPuzzleRender() {
  const tiles = document.querySelectorAll(".tile");
  tiles.forEach((tile, i) => {
    let val = order[i];
    tile.style.backgroundPosition =
      `${-(val % 4) * 80}px ${-Math.floor(val / 4) * 80}px`;
  });
}

function checkWin() {
  if (order.every((v,i)=>v===i)) {
    switchScreen(2,3);
  }
}

// SCREEN SWITCH
function switchScreen(from,to){
  document.getElementById("screen"+from).classList.remove("active");
  document.getElementById("screen"+to).classList.add("active");
}

// NO BUTTON RUN
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.left = Math.random()*window.innerWidth+"px";
  noBtn.style.top = Math.random()*window.innerHeight+"px";
  yesBtn.style.transform = "scale(1.3)";
});

// CELEBRATION
function celebrate(){
  switchScreen(3,4);

  for(let i=0;i<120;i++){
    let c = document.createElement("div");
    c.style.position="absolute";
    c.style.width="8px";
    c.style.height="8px";
    c.style.background="white";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.top="0px";
    c.style.animation="fall 3s linear infinite";
    document.body.appendChild(c);
  }
}

</script>

</body>
</html>
