<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Siya ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  overflow: hidden;
}
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active {
  display: flex;
}
h1 {
  color: #fff;
}
.heart {
  font-size: 80px;
  cursor: pointer;
  animation: beat 1s infinite;
}
@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.puzzle {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  grid-template-rows: repeat(4, 80px);
  gap: 2px;
}
.tile {
  width: 80px;
  height: 80px;
  background-size: 320px 320px;
  cursor: pointer;
}
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
}
#yesBtn {
  background: green;
  color: white;
}
#noBtn {
  background: red;
  color: white;
  position: absolute;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="screen1" class="screen active">
  <h1>Hey Siya, someone made this for you ❤️<br>Click on the heart</h1>
  <div class="heart" onclick="startPuzzle()">❤️</div>
</div>

<!-- Screen 2: Puzzle -->
<div id="screen2" class="screen">
  <h2>Arrange the puzzle 💕</h2>
  <div class="puzzle" id="puzzle"></div>
</div>

<!-- Screen 3: Proposal -->
<div id="screen3" class="screen">
  <h2 style="color:white; max-width:600px;">
    Every moment with you feels like a dream from which I don't want to wake up. <br><br>
    I never want to lose you and want you to be my forever and ever ❤️<br><br>
    Please accept my proposal 💍
  </h2>

  <button id="yesBtn" onclick="celebrate()">😻 Yes</button>
  <button id="noBtn">🙀 No</button>
</div>

<!-- Screen 4 -->
<div id="screen4" class="screen">
  <h1>🎉 YAAAYYY!!! 🎉</h1>
  <h2>❤️🥳👏</h2>
</div>

<script>
const imageURL = "YOUR_IMAGE_HERE"; // Replace with your image path

// PUZZLE
let tiles = [];
let correct = [];

function startPuzzle() {
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");

  const puzzle = document.getElementById("puzzle");
  puzzle.innerHTML = "";

  tiles = [];
  correct = [];

  for (let i = 0; i < 16; i++) {
    let div = document.createElement("div");
    div.className = "tile";
    div.style.backgroundImage = `url('${imageURL}')`;
    div.style.backgroundPosition =
      `${-(i % 4) * 80}px ${-Math.floor(i / 4) * 80}px`;

    tiles.push(i);
    correct.push(i);

    puzzle.appendChild(div);
  }

  shuffle();
  render();
}

function shuffle() {
  tiles.sort(() => Math.random() - 0.5);
}

function render() {
  const puzzle = document.getElementById("puzzle");
  [...puzzle.children].forEach((tile, i) => {
    let index = tiles[i];
    tile.style.backgroundPosition =
      `${-(index % 4) * 80}px ${-Math.floor(index / 4) * 80}px`;

    tile.onclick = () => swap(i);
  });
}

function swap(i) {
  if (i < 15) {
    [tiles[i], tiles[i+1]] = [tiles[i+1], tiles[i]];
    render();
    checkWin();
  }
}

function checkWin() {
  if (tiles.toString() === correct.toString()) {
    document.getElementById("screen2").classList.remove("active");
    document.getElementById("screen3").classList.add("active");
  }
}

// NO BUTTON RUN
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

noBtn.addEventListener("mouseover", () => {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  yesBtn.style.transform = "scale(1.2)";
});

// CELEBRATION
function celebrate() {
  document.getElementById("screen3").classList.remove("active");
  document.getElementById("screen4").classList.add("active");

  for (let i = 0; i < 100; i++) {
    let confetti = document.createElement("div");
    confetti.style.position = "absolute";
    confetti.style.width = "10px";
    confetti.style.height = "10px";
    confetti.style.background = "white";
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.top = Math.random() * window.innerHeight + "px";
    confetti.style.animation = "fall 3s linear infinite";
    document.body.appendChild(confetti);
  }
}
</script>

</body>
</html>
