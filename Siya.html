<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bonku ❤️ Siya</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Comic Sans MS', cursive;
        background: radial-gradient(circle at top, #1a001a, #000);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 40px;
        color: #ff4d6d;
        text-shadow: 0 0 20px #ff4d6d;
    }

    img {
        width: 250px;
        border-radius: 20px;
        margin-top: 20px;
        box-shadow: 0 0 30px #ff4d6d;
        animation: zoom 4s infinite alternate;
    }

    @keyframes zoom {
        from { transform: scale(1); }
        to { transform: scale(1.05); }
    }

    #message {
        font-size: 22px;
        margin: 20px;
        min-height: 80px;
    }

    .buttons {
        margin-top: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        margin: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    #yes {
        background: #ff4d6d;
        color: white;
    }

    #no {
        background: #555;
        color: white;
        position: absolute;
    }

    button:hover {
        transform: scale(1.1);
    }

    .heart {
        position: absolute;
        color: #ff4d6d;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh); opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
        from { opacity: 0.3; }
        to { opacity: 1; }
    }
</style>

</head>
<body>

<h1>💖 Bonku ❤️ Siya 💖</h1>

<img src="photo.jpg" alt="Our Love 💕">

<div id="message"></div>

<div class="buttons">
    <button id="yes" onclick="yesClicked()">Yes 💍🥺</button>
    <button id="no" onmouseover="moveButton()">No 😜</button>
</div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<script>
// Typing love message
const text = "Siya... from the moment I met you, my world changed 💖\nYou are my smile, my peace, my everything 🥰\nEvery second with you feels magical ✨\nI never want to lose you...\nWill you stay with me forever? 💍🥺";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}
typing();

// YES button
function yesClicked() {
    document.body.innerHTML = `
        <h1>💖 She Said YES! 💖</h1>
        <h2>Bonku ❤️ Siya Forever 🥰✨</h2>
    `;
}

// NO button moves
function moveButton() {
    let btn = document.getElementById("no");
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);

// Stars
for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);
}
</script>

</body>
</html>
